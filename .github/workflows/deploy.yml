name: Java CI/CD with Gradle and Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle (Test included)
      run: ./gradlew build

    - name: Docker Image Build & Push
      run: |
        docker build -t jungyoomin0112-dotcom/petclinic-ci-cd:latest .
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push jungyoomin0112-dotcom/petclinic-ci-cd:latest

    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull jungyoomin0112-dotcom/petclinic-ci-cd:latest
          docker stop petclinic-app || true
          docker rm petclinic-app || true
          docker run -d --name petclinic-app -p 8080:8080 jungyoomin0112-dotcom/petclinic-ci-cd:latest